<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Detail — Hanif Fathurrahman</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      #project-detail {
        padding: 8rem 5% 5rem;
        max-width: 1200px;
        margin: 0 auto;
        min-height: 100vh;
      }

      .fade-on-scroll {
        opacity: 0;
        transform: translateY(40px);
        transition:
          opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1),
          transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        will-change: opacity, transform;
      }

      .fade-on-scroll.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      .back-nav {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 4rem;
      }

      .back-link {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-family: var(--mono);
        color: var(--muted);
        text-decoration: none;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      }

      .back-link svg {
        transition: transform 0.4s ease;
      }

      .back-link:hover {
        color: var(--accent);
      }

      .back-link:hover svg {
        transform: translateX(-5px);
      }

      .project-hero {
        margin-bottom: 5rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding-bottom: 4rem;
      }

      #detail-company {
        font-family: var(--mono);
        color: var(--accent);
        letter-spacing: 0.15em;
        font-size: 0.85rem;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
        display: inline-block;
        padding: 0.3rem 0.8rem;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        transition: all 0.3s ease;
      }

      #detail-company:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: var(--accent);
      }

      #detail-title {
        font-family: var(--mono);
        font-size: clamp(2.5rem, 6vw, 4.5rem);
        line-height: 1.1;
        letter-spacing: -0.03em;
        margin-bottom: 2rem;
        max-width: 900px;
      }

      #detail-desc {
        font-family: "DM Sans", sans-serif;
        color: var(--muted);
        font-size: clamp(1.1rem, 2vw, 1.3rem);
        line-height: 1.6;
        max-width: 700px;
        font-weight: 300;
      }

      .project-grid {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 4rem;
      }

      .sidebar-meta {
        position: sticky;
        top: 100px;
        height: fit-content;
      }

      .meta-block {
        margin-bottom: 3rem;
      }

      .meta-label {
        font-family: var(--mono);
        font-size: 0.75rem;
        color: var(--muted);
        letter-spacing: 0.1em;
        margin-bottom: 1rem;
        display: block;
      }

      #detail-stack {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      #detail-stack .tag {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 0.4rem 0.8rem;
        font-size: 0.8rem;
        cursor: default;
        transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      }

      #detail-stack .tag:hover {
        border-color: var(--accent);
        color: var(--accent);
        transform: translateY(-3px);
        background: rgba(255, 255, 255, 0.03);
      }

      .detail-content {
        font-family: "DM Sans", sans-serif;
        color: var(--text);
        line-height: 1.8;
        font-weight: 300;
        font-size: 1.1rem;
      }

      .detail-content h3 {
        font-family: var(--mono);
        font-size: 1.5rem;
        margin: 3rem 0 1.5rem;
        font-weight: 500;
      }

      .detail-content p {
        margin-bottom: 1.5rem;
      }

      .detail-content ul {
        list-style: none;
        padding: 0;
      }

      .detail-content li {
        position: relative;
        padding-left: 1.5rem;
        margin-bottom: 1rem;
        color: rgba(255, 255, 255, 0.85);
        transition:
          transform 0.3s ease,
          color 0.3s ease;
      }

      .detail-content li:hover {
        color: #ffffff;
        transform: translateX(5px);
      }

      .detail-content li::before {
        content: "▹";
        position: absolute;
        left: 0;
        color: var(--accent);
        font-family: var(--mono);
        transition: transform 0.3s ease;
      }

      .detail-content li:hover::before {
        transform: scale(1.2);
      }

      @media (max-width: 900px) {
        .project-grid {
          grid-template-columns: 1fr;
          gap: 3rem;
        }
        .sidebar-meta {
          position: relative;
          top: 0;
          display: flex;
          flex-wrap: wrap;
          gap: 2rem;
          border-bottom: 1px solid rgba(255, 255, 255, 0.1);
          padding-bottom: 2rem;
        }
        .meta-block {
          margin-bottom: 0;
        }
      }

      .slider-container {
        position: relative;
        width: 100%;
        margin: 3rem 0 0;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .slide {
        display: none;
        width: 100%;
      }

      .slide.active {
        display: block;
        animation: fade 1.5s ease-in-out;
      }

      .slide img {
        width: 100%;
        height: auto;
        display: block;
        object-fit: cover;
      }

      .slider-dots {
        position: absolute;
        bottom: 1.5rem;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 0.8rem;
        z-index: 10;
        padding: 0.5rem 1rem;
        background: rgba(0, 0, 0, 0.4);
        border-radius: 20px;
        backdrop-filter: blur(4px);
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      }

      .dot.active {
        background: var(--accent);
        transform: scale(1.3);
      }

      .dot:hover:not(.active) {
        background: rgba(255, 255, 255, 0.8);
        transform: scale(1.1);
      }

      @keyframes fade {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="nav-logo"><a href="/">haniv_fr</a></div>
    </nav>

    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <section id="project-detail">
      <div class="back-nav fade-on-scroll">
        <a
          href="#"
          onclick="
            history.back();
            return false;
          "
          class="back-link"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          Back to Projects
        </a>
      </div>

      <div id="content-container">
        <div class="project-hero fade-on-scroll">
          <p id="detail-company"></p>
          <h1 id="detail-title">Loading...</h1>
          <p id="detail-desc"></p>
          <div id="detail-slider"></div>
        </div>

        <div class="project-grid">
          <div class="sidebar-meta fade-on-scroll">
            <div class="meta-block">
              <span class="meta-label">TECH STACK</span>
              <div id="detail-stack"></div>
            </div>
            
            <div class="meta-block">
              <span class="meta-label">ROLE</span>
              <p id="detail-role" style="font-family: var(--mono); font-size: 0.9rem; margin: 0;"></p>
            </div>
          </div>

          <div class="detail-content fade-on-scroll" id="detail-body"></div>
        </div>
      </div>

      <div
        id="error-container"
        style="display: none; text-align: center; padding: 10rem 0"
      >
        <h1
          style="
            font-family: var(--mono);
            font-size: 4rem;
            color: var(--accent);
            margin-bottom: 1rem;
          "
        >
          404
        </h1>
        <p style="font-family: var(--mono); color: var(--muted)">
          PROJECT MODULE NOT FOUND
        </p>
        <a
          href="/"
          style="
            display: inline-block;
            margin-top: 2rem;
            color: #fff;
            text-decoration: underline;
            font-family: var(--mono);
          "
          >Return to Base</a
        >
      </div>
    </section>

    <script>
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("is-visible");
            } else {
              entry.target.classList.remove("is-visible");
            }
          });
        },
        { threshold: 0.1 },
      );

      document.querySelectorAll(".fade-on-scroll").forEach((el) => {
        observer.observe(el);
      });

      const dot = document.getElementById("cursorDot");
      const ring = document.getElementById("cursorRing");
      let mx = 0,
        my = 0,
        rx = 0,
        ry = 0;
      document.addEventListener("mousemove", (e) => {
        mx = e.clientX;
        my = e.clientY;
        dot.style.left = mx + "px";
        dot.style.top = my + "px";
      });
      (function animateRing() {
        rx += (mx - rx) * 0.12;
        ry += (my - ry) * 0.12;
        ring.style.left = rx + "px";
        ring.style.top = ry + "px";
        requestAnimationFrame(animateRing);
      })();
    </script>
    <script src="project.js"></script>
  </body>
</html>
